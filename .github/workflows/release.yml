name: Release

on:
    push:
        branches:
            - main
    # Manual rebuild of the binaries for an already-published tag (e.g. when a
    # build failed after the release was cut). Provide the existing tag.
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing tag to build binaries for (e.g. v0.1.0)'
                required: true

permissions:
    contents: write
    pull-requests: write

jobs:
    # Maintains a release PR from Conventional Commits (version bump +
    # CHANGELOG). Merging that PR creates the git tag + GitHub release, which
    # gates the binary build below. release_created is only true on that merge.
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - uses: googleapis/release-please-action@v5
              id: release

    # Builds the unsigned macOS binary and uploads it to the release that
    # release-please just published. Runs in the same workflow because a tag
    # pushed with the default GITHUB_TOKEN does not trigger a separate
    # tag-listening workflow. Also runnable manually via workflow_dispatch to
    # rebuild an existing tag.
    publish-tauri:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
