name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [macos-latest, ubuntu-latest, windows-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - uses: dtolnay/rust-toolchain@stable

            - name: Install Linux dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libgtk-3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    patchelf

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Import Apple Developer certificate
              if: matrix.os == 'macos-latest'
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security set-keychain-settings -t 3600 -u build.keychain
                  security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
                  rm certificate.p12

            - name: Resolve macOS signing identity
              if: matrix.os == 'macos-latest'
              run: |
                  CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | awk -F'"' '{print $2}' | head -n 1)
                  if [ -z "$CERT_ID" ]; then
                    echo "Developer ID Application certificate not found in build.keychain" >&2
                    security find-identity -v -p codesigning build.keychain >&2
                    exit 1
                  fi
                  echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

            - name: Build Tauri app
              run: pnpm tauri build

            - name: Verify macOS code signature
              if: matrix.os == 'macos-latest'
              run: |
                  APP_BUNDLE=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
                  if [ -z "$APP_BUNDLE" ]; then
                    echo "No .app bundle found under src-tauri/target/release/bundle/macos" >&2
                    exit 1
                  fi
                  codesign -dv --verbose=4 "$APP_BUNDLE"
                  codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"

            - name: Notarize and staple macOS artifacts
              if: matrix.os == 'macos-latest'
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  DMG_PATH=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
                  if [ -z "$DMG_PATH" ]; then
                    echo "No .dmg found under src-tauri/target/release/bundle/dmg" >&2
                    exit 1
                  fi
                  APP_BUNDLE=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
                  if [ -z "$APP_BUNDLE" ]; then
                    echo "No .app bundle found under src-tauri/target/release/bundle/macos" >&2
                    exit 1
                  fi
                  xcrun notarytool submit "$DMG_PATH" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait
                  xcrun stapler staple "$DMG_PATH"
                  xcrun stapler staple "$APP_BUNDLE"
                  xcrun stapler validate "$DMG_PATH"
                  xcrun stapler validate "$APP_BUNDLE"

            - name: Upload artifacts to release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      src-tauri/target/release/bundle/dmg/*.dmg
                      src-tauri/target/release/bundle/macos/*.app.tar.gz
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/deb/*.deb
                      src-tauri/target/release/bundle/rpm/*.rpm
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/nsis/*.exe
                  fail_on_unmatched_files: false
