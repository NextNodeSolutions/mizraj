name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    format:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm format:check

    rust:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - uses: Swatinem/rust-cache@v2

            # Tauri's Linux build pulls in GTK/glib/webkit via tauri-runtime,
            # so the src-tauri crate cannot compile on ubuntu without these.
            # Mirrors the prerequisites listed in the Tauri v2 docs.
            - name: Install Tauri Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      libssl-dev \
                      libxdo-dev \
                      build-essential \
                      file

            - name: cargo fmt --check
              run: cargo fmt --all -- --check

            # Exclude the two crates that need libghostty linked at build time
            # from --all-targets (test/example binaries link, and CI has no
            # libghostty). The lib-only step below still lints them; the
            # `verify-libghostty` job covers the header supply chain, and local
            # dev runs (LIBGHOSTTY_LIB_DIR set) cover the ANSI integration test.
            - name: cargo clippy
              run: |
                  cargo clippy \
                      --workspace \
                      --exclude agent-cockpit-term \
                      --exclude agent-cockpit-term-sys \
                      --all-targets \
                      -- -D warnings

            # rlibs don't trigger the final linker, so we can clippy the term
            # wrappers' lib targets even without libghostty present. Catches
            # regressions in the safe wrapper that the workspace step misses.
            - name: cargo clippy (term wrappers, lib only)
              run: |
                  cargo clippy \
                      -p agent-cockpit-term-sys \
                      -p agent-cockpit-term \
                      --lib \
                      -- -D warnings

            - name: cargo test
              run: |
                  cargo test \
                      --workspace \
                      --exclude agent-cockpit-term \
                      --exclude agent-cockpit-term-sys \
                      --exclude tauri-app

    verify-libghostty:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Verify vendored headers match CHECKSUMS
              working-directory: crates/agent-cockpit-term-sys/vendor
              run: sha256sum -c CHECKSUMS

            - name: Verify CHECKSUMS lists every vendored header
              working-directory: crates/agent-cockpit-term-sys/vendor
              run: |
                  set -euo pipefail
                  listed=$(awk '{print $2}' CHECKSUMS | sort)
                  actual=$(find include -type f | sort)
                  diff <(printf '%s\n' "$listed") <(printf '%s\n' "$actual")

            - name: Verify VERSION matches upstream
              working-directory: crates/agent-cockpit-term-sys/vendor
              run: |
                  set -euo pipefail
                  version=$(tr -d '[:space:]' < VERSION)
                  tmp=$(mktemp -d)
                  while IFS= read -r line; do
                      [ -z "$line" ] && continue
                      path=$(awk '{print $2}' <<<"$line")
                      url="https://raw.githubusercontent.com/ghostty-org/ghostty/${version}/${path}"
                      mkdir -p "$tmp/$(dirname "$path")"
                      curl -sSfL --retry 3 -o "$tmp/$path" "$url"
                  done < CHECKSUMS
                  cp CHECKSUMS "$tmp/CHECKSUMS"
                  (cd "$tmp" && sha256sum -c CHECKSUMS)

    e2e:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Run E2E tests
              run: pnpm test:e2e

    # D13 — Phase 3 keeps the schema unchanged. Migration 0005 lands in Phase 5
    # (D7); update or remove this job there. See SAS-406.
    phase-3-migration-audit:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Assert exactly 3 SQL migrations (0001-0003)
              run: |
                  set -euo pipefail
                  count=$(ls src-tauri/migrations/*.sql | wc -l | tr -d ' ')
                  if [ "$count" -ne 3 ]; then
                      echo "Expected 3 .sql migrations in src-tauri/migrations/, got $count" >&2
                      ls src-tauri/migrations/ >&2
                      exit 1
                  fi
                  for expected in 0001 0002 0003; do
                      if ! ls src-tauri/migrations/${expected}_*.sql >/dev/null 2>&1; then
                          echo "Missing expected migration prefix: ${expected}_*.sql" >&2
                          exit 1
                      fi
                  done
